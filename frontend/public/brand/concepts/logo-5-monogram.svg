<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Canopy monogram concept" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
  <!-- Bent-branch "C": an open 'C' drawn as a twig with three leaves.
       The negative space between the branch strokes reads as an upward bar chart. -->

  <!-- Upward bar chart (negative-space cue) drawn faintly in the gap -->
  <g stroke-width="5" opacity="0.35">
    <line x1="50" y1="88" x2="50" y2="74" />
    <line x1="64" y1="88" x2="64" y2="64" />
    <line x1="78" y1="88" x2="78" y2="54" />
  </g>
  <!-- Baseline ground for the bars -->
  <line x1="42" y1="92" x2="86" y2="92" stroke-width="4" opacity="0.35" />

  <!-- Branch shaped like a 'C' (open to the right) -->
  <path d="M96 34
           C 72 18, 36 28, 30 64
           C 26 96, 60 114, 96 100" />

  <!-- Three canopy leaves sprouting along the branch -->
  <!-- Leaf 1 (top of C) -->
  <path d="M78 30
           C 86 22, 94 22, 96 30
           C 92 38, 82 38, 78 30 Z"
        fill="currentColor" stroke="none" />
  <!-- Leaf 2 (middle left) -->
  <path d="M24 60
           C 18 54, 18 46, 26 44
           C 32 50, 32 58, 24 60 Z"
        fill="currentColor" stroke="none" />
  <!-- Leaf 3 (bottom of C) -->
  <path d="M86 98
           C 96 96, 104 100, 102 108
           C 94 112, 84 108, 86 98 Z"
        fill="currentColor" stroke="none" />

  <!-- Tiny trailing sprout tip -->
  <circle cx="96" cy="34" r="2.5" fill="currentColor" stroke="none" />
  <circle cx="96" cy="100" r="2.5" fill="currentColor" stroke="none" />
</svg>
