<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Canopy">
  <defs>
    <!-- Deep forest-green rounded-tile ground, matches the OG banner -->
    <linearGradient id="canopyTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#12382a"/>
      <stop offset="100%" stop-color="#081a12"/>
    </linearGradient>

    <!-- Leaf lobe gradient: bright emerald top -> pine green bottom -->
    <radialGradient id="canopyLeaf" cx="0.4" cy="0.3" r="0.85">
      <stop offset="0%"   stop-color="#6ee7b7"/>
      <stop offset="55%"  stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#065f46"/>
    </radialGradient>

    <!-- Gold sun accent -->
    <radialGradient id="canopySun" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="60%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>

    <!-- Trunk -->
    <linearGradient id="canopyTrunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#92400e"/>
      <stop offset="100%" stop-color="#5c2e0a"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square tile -->
  <rect x="0" y="0" width="128" height="128" rx="26" ry="26" fill="url(#canopyTile)"/>

  <!-- Tree group centered in tile -->
  <g transform="translate(4,2)">
    <!-- Trunk (short, slightly tapered) -->
    <path d="M58 82 Q58 96 61 102 L63 102 Q66 96 66 82 Z" fill="url(#canopyTrunk)"/>

    <!-- Canopy: four overlapping lobes creating a bushy crown.
         Order matters for overlap; back-to-front. -->
    <!-- back lower-left -->
    <circle cx="42" cy="62" r="22" fill="url(#canopyLeaf)"/>
    <!-- back lower-right -->
    <circle cx="82" cy="62" r="22" fill="url(#canopyLeaf)"/>
    <!-- upper-left -->
    <circle cx="50" cy="42" r="22" fill="url(#canopyLeaf)"/>
    <!-- upper-right (slightly smaller, tucks against the sun) -->
    <circle cx="78" cy="38" r="18" fill="url(#canopyLeaf)"/>
  </g>

  <!-- Gold sun, upper right -->
  <circle cx="100" cy="28" r="7.5" fill="url(#canopySun)"/>
</svg>
