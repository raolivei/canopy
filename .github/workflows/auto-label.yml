name: Auto Label Issues and PRs

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  auto-label:
    uses: raolivei/github-workflows/.github/workflows/auto-label.yml@main
    with:
      config_path: '.github/labeling/config.yml'
      enable_pr_file_labeling: true
      enable_content_labeling: true
