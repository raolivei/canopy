name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "VERSION"
      - ".github/workflows/build-and-push.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/**"
      - "VERSION"
  workflow_dispatch:

# ``contents: write`` lets the reusable docker-build workflow push annotated
# git tags (``v*``) that mirror ``VERSION`` when ``create-git-tag`` is enabled.
permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-api:
    uses: raolivei/github-workflows/.github/workflows/docker-build.yml@main
    with:
      image-name: canopy-api
      context: ./backend
      # Annotated git tag ``v$(cat VERSION)`` on ``main`` after a successful
      # image push — aligns the repo with GHCR semver tags. Idempotent when
      # api + frontend jobs race (second push is a no-op).
      create-git-tag: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    secrets:
      REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-frontend:
    uses: raolivei/github-workflows/.github/workflows/docker-build.yml@main
    with:
      image-name: canopy-frontend
      context: ./frontend
      create-git-tag: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    secrets:
      REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
