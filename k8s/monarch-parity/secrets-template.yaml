---
apiVersion: v1
kind: Secret
metadata:
  name: canopy-monarch-secrets
  namespace: canopy-monarch
type: Opaque
stringData:
  database-url: "postgresql+psycopg://canopy_monarch:CHANGE_ME@canopy-monarch-postgres:5432/canopy_monarch"
  postgres-password: "CHANGE_ME"
  secret-key: "CHANGE_ME_GENERATE_STRONG_KEY"
  # Optional — API reads these via env (map keys to QUESTRADE_REFRESH_TOKEN / WISE_API_TOKEN / MONARCH_API_TOKEN in deploy).
  # Prefer HashiCorp Vault + External Secrets Operator: sync Vault paths into this Secret, never commit values.
  # questrade-refresh-token: ""
  # wise-api-token: ""
  # monarch-api-token: ""

# To create the secret:
# 1. Copy this file to secrets.yaml
# 2. Replace CHANGE_ME values with actual secrets
# 3. Apply: kubectl apply -f secrets.yaml
# 4. Delete secrets.yaml (don't commit secrets!)
#
# To generate a strong secret key:
# python3 -c "import secrets; print(secrets.token_urlsafe(32))"
